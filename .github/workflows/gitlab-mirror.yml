name: GitLab Sandbox Mirror

on:
  push:
    branches: [main]
    tags:
      - "*"
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

concurrency:
  group: gitlab-sandbox-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Skip when mirror secret is not configured
        if: ${{ secrets.GITLAB_MIRROR_PUSH_URL == '' }}
        run: echo "GITLAB_MIRROR_PUSH_URL is not configured. Skipping GitLab mirror sync."

      - name: Checkout repository
        if: ${{ secrets.GITLAB_MIRROR_PUSH_URL != '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches and tags
        if: ${{ secrets.GITLAB_MIRROR_PUSH_URL != '' }}
        run: |
          git fetch --force --prune origin \
            "+refs/heads/*:refs/remotes/origin/*" \
            "+refs/tags/*:refs/tags/*"

      - name: Configure GitLab remote
        if: ${{ secrets.GITLAB_MIRROR_PUSH_URL != '' }}
        run: git remote add gitlab "${{ secrets.GITLAB_MIRROR_PUSH_URL }}"

      - name: Push main and tags to GitLab
        if: ${{ secrets.GITLAB_MIRROR_PUSH_URL != '' }}
        run: |
          git push --force gitlab refs/remotes/origin/main:refs/heads/main
          git push --force --tags gitlab
