# S4 — Política de cuotas por proveedor (doc 15)
# Inventario real de modelos disponibles:
#
# Anthropic (token sesión Pro):
#   claude-haiku-4-5, claude-opus-4-6, claude-sonnet-4-6
#
# OpenAI (OAuth / Foundry / GitHub Models):
#   gpt-5.2, gpt-5.3-codex (default, prioridad máxima)
#
# Google AI Studio (api-key):
#   gemini-3.1-pro-preview-customtools (mejor), gemini-flash-latest, gemini-flash-lite-latest
#
# Google Vertex AI (api-key + project):
#   gemini-3.1-pro-preview
#
# Azure AI Foundry (endpoint + key, en progreso):
#   gpt-5.3-codex (deployment dedicado)

providers:
  # --- Azure AI Foundry (deployment dedicado) — PRIORIDAD 0 ---
  azure_foundry:
    limit_requests: 2000
    window_seconds: 3600    # 1h
    warn: 0.80
    restrict: 0.95

  # --- OpenAI Codex vía GitHub Models (fallback) — PRIORIDAD 1 ---
  openai_codex:
    limit_requests: 400
    window_seconds: 10800   # 3h
    warn: 0.75
    restrict: 0.90

  # --- Anthropic Claude Sonnet (sesión Pro) ---
  claude_pro:
    limit_requests: 200
    window_seconds: 18000   # 5h
    warn: 0.80
    restrict: 0.90

  # --- Anthropic Claude Opus (tareas críticas) ---
  claude_opus:
    limit_requests: 50
    window_seconds: 18000   # 5h
    warn: 0.60
    restrict: 0.80

  # --- Anthropic Claude Haiku (rápido/económico) ---
  claude_haiku:
    limit_requests: 500
    window_seconds: 18000   # 5h
    warn: 0.85
    restrict: 0.95

  # --- Google Gemini Pro (AI Studio, customtools — mejor Gemini) ---
  gemini_pro:
    limit_requests: 500
    window_seconds: 86400   # 1 día
    warn: 0.80
    restrict: 0.95

  # --- Google Gemini Flash ---
  gemini_flash:
    limit_requests: 1000
    window_seconds: 86400
    warn: 0.85
    restrict: 0.97

  # --- Google Gemini Flash Lite ---
  gemini_flash_lite:
    limit_requests: 2000
    window_seconds: 86400
    warn: 0.90
    restrict: 0.98

  # --- Google Vertex (gemini-3.1-pro-preview) ---
  gemini_vertex:
    limit_requests: 300
    window_seconds: 86400
    warn: 0.80
    restrict: 0.95

routing:
  coding:
    preferred: azure_foundry
    fallback_chain: [openai_codex, claude_pro, gemini_pro, gemini_flash]
  general:
    preferred: azure_foundry
    fallback_chain: [openai_codex, claude_pro, gemini_pro, gemini_flash]
  ms_stack:
    preferred: azure_foundry
    fallback_chain: [openai_codex, claude_pro, gemini_pro]
  writing:
    preferred: claude_pro
    fallback_chain: [claude_opus, azure_foundry, gemini_pro]
  research:
    preferred: gemini_pro
    fallback_chain: [gemini_vertex, azure_foundry, claude_pro, gemini_flash]
  critical:
    preferred: claude_opus
    fallback_chain: [claude_pro, azure_foundry, openai_codex]
  light:
    preferred: gemini_flash
    fallback_chain: [gemini_flash_lite, claude_haiku, gemini_pro]
