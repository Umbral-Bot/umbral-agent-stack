# S5 — Política de herramientas Windows (ToolPolicy)
# Solo las herramientas listadas aquí pueden ser invocadas por Rick desde la VM.

tools:
  pad:
    description: Power Automate Desktop flows
    allowed_flows:
      - EchoTest       # Flujo de prueba (crear en PAD)
      # - MiFlujoRPA   # Añadir flujos reales aquí
    default_timeout_sec: 60

  scripts:
    description: Scripts PowerShell permitidos
    allowed:
      - Get-SystemInfo   # Ejemplo: script que devuelve info del sistema
    base_path: C:\GitHub\umbral-agent-stack\scripts\windows

  fs:
    description: Operaciones simples de filesystem Windows (sin PAD)
    allowed_base_paths:
      - C:\\Windows\\Temp
      - C:\\Granola
      - C:\\Users\\rick\\AppData\\Roaming\\Granola
      - G:\\Mi unidad\\Rick-David
    # Límite para windows.fs.write_bytes_b64 (bytes). Default 5MB.
    max_bytes_b64: 5000000

  mcp:
    description: MCP tools para Windows (futuro)
    enabled: false

# ---------------------------------------------------------------------------
# GitHub Copilot CLI capability — DISABLED stub (Fase 1, design-only).
# Ver docs/copilot-cli-capability-design.md para arquitectura completa.
# Cualquier cambio aquí requiere revisión humana explícita por fase.
# Defensa-en-profundidad: además de este stub, la capability respeta el
# env flag RICK_COPILOT_CLI_ENABLED (default false). Ambos deben ser true
# para habilitar la task copilot_cli.run.
# ---------------------------------------------------------------------------
copilot_cli:
  enabled: false                    # MASTER SWITCH — no tocar sin aprobación.
  default_max_wall_sec: 120
  default_max_tokens: 8000
  default_max_files_touched: 0      # 0 = read-only por mission default
  banned_subcommands:
    # Git push variants — defensa en profundidad: substring match cubre
    # también las variantes pero las listamos explícitamente para audit.
    - "git push"
    - "git push -f"
    - "git push --force"
    - "git push --force-with-lease"
    - "git push --force-with-lease="
    - "git push --mirror"
    - "git push --tags"
    - "git push --delete"
    - "git push origin"
    - "git push --set-upstream"
    - "git push -u"
    - "git push --no-verify"
    # Otras mutaciones git remotas / globales
    - "git remote add"
    - "git remote set-url"
    - "git config --global"
    - "git filter-branch"
    - "git update-ref"
    # gh PR / release / repo / secret / auth — toda mutación remota
    - "gh pr create"
    - "gh pr merge"
    - "gh pr comment"
    - "gh pr review"
    - "gh pr close"
    - "gh pr edit"
    - "gh pr ready"
    - "gh pr reopen"
    - "gh release create"
    - "gh release delete"
    - "gh release upload"
    - "gh repo create"
    - "gh repo delete"
    - "gh repo edit"
    - "gh repo rename"
    - "gh repo archive"
    - "gh secret set"
    - "gh secret delete"
    - "gh secret"
    - "gh auth login"
    - "gh auth logout"
    - "gh auth refresh"
    - "gh auth setup-git"
    - "gh auth"
    - "gh api"             # no API arbitraria a github.com
    - "gh workflow run"
    - "gh workflow disable"
    - "gh workflow enable"
    - "gh ssh-key add"
    - "gh gpg-key add"
    # Filesystem / shell destructivos
    - "rm -rf"
    - "rm -fr"
    - "chmod -R"
    - "chown -R"
    - "dd if="
    - "mkfs"
    - ":(){ :|:&"          # fork bomb
    - "sudo"
    - "su -"
  missions: {}                      # vacío hasta F4

  # ---------------------------------------------------------------------
  # Egress profile (DESIGN ONLY, NO ACTIVATION). See docs/copilot-cli-
  # capability-design.md §5.3 / §10. Used in F6+ when real Copilot calls
  # are needed. F2/F3/F4 stay on --network=none.
  # ---------------------------------------------------------------------
  egress:
    profile_name: copilot-egress
    activated: false
    allowed_endpoints:
      - api.githubcopilot.com:443
      - api.individual.githubcopilot.com:443
      - api.business.githubcopilot.com:443
      - api.enterprise.githubcopilot.com:443
      - api.github.com:443
      - copilot-proxy.githubusercontent.com:443
    blocked_by_default:
      - "*"
    audit_log: reports/copilot-cli/egress/<YYYY-MM>/<batch_id>.jsonl
    enforcement: docker network + egress firewall (nftables) + deny-by-default
