# S5 — Política de herramientas Windows (ToolPolicy)
# Solo las herramientas listadas aquí pueden ser invocadas por Rick desde la VM.

tools:
  pad:
    description: Power Automate Desktop flows
    allowed_flows:
      - EchoTest       # Flujo de prueba (crear en PAD)
      # - MiFlujoRPA   # Añadir flujos reales aquí
    default_timeout_sec: 60

  scripts:
    description: Scripts PowerShell permitidos
    allowed:
      - Get-SystemInfo   # Ejemplo: script que devuelve info del sistema
    base_path: C:\GitHub\umbral-agent-stack\scripts\windows

  fs:
    description: Operaciones simples de filesystem Windows (sin PAD)
    allowed_base_paths:
      - C:\\Windows\\Temp
      - C:\\Granola
      - C:\\Users\\rick\\AppData\\Roaming\\Granola
      - G:\\Mi unidad\\Rick-David
    # Límite para windows.fs.write_bytes_b64 (bytes). Default 5MB.
    max_bytes_b64: 5000000

  mcp:
    description: MCP tools para Windows (futuro)
    enabled: false

# ---------------------------------------------------------------------------
# GitHub Copilot CLI capability — DISABLED stub (Fase 1, design-only).
# Ver docs/copilot-cli-capability-design.md para arquitectura completa.
# Cualquier cambio aquí requiere revisión humana explícita por fase.
# Defensa-en-profundidad: además de este stub, la capability respeta el
# env flag RICK_COPILOT_CLI_ENABLED (default false). Ambos deben ser true
# para habilitar la task copilot_cli.run.
# ---------------------------------------------------------------------------
copilot_cli:
  enabled: false                    # MASTER SWITCH — no tocar sin aprobación.
  default_max_wall_sec: 120
  default_max_tokens: 8000
  default_max_files_touched: 0      # 0 = read-only por mission default
  banned_subcommands:
    - "git push"
    - "git remote add"
    - "gh pr create"
    - "gh pr merge"
    - "gh pr comment"
    - "gh auth"
    - "gh secret"
    - "rm -rf"
    - "chmod -R"
  missions: {}                      # vacío hasta F4
