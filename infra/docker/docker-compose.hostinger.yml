# Umbral Agent Stack — VPS Docker Services
# Usa: docker compose -f infra/docker/docker-compose.hostinger.yml up -d

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Redis — Cola de tareas + estado transaccional
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: umbral-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379" # Solo localhost, no exponer públicamente
    volumes:
      - redis_data:/data
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 100 --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
  # ---------------------------------------------------------------------------
  # LiteLLM — Proxy multi-modelo (S4)
  # ---------------------------------------------------------------------------
  # litellm:
  #   image: ghcr.io/berriai/litellm:main-latest
  #   container_name: umbral-litellm
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:4000:4000"
  #   volumes:
  #     - ./litellm_config.yaml:/app/config.yaml
  #   environment:
  #     - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-CHANGE_ME_litellm_key}
  #     - OPENAI_API_KEY=${OPENAI_API_KEY:-}
  #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
  #     - GEMINI_API_KEY=${GEMINI_API_KEY:-}
  #   command: ["--config", "/app/config.yaml", "--port", "4000"]
  #   depends_on:
  #     redis:
  #       condition: service_healthy

volumes:
  redis_data:
    driver: local
