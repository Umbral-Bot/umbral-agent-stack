# ============================================================
# LiteLLM Config — Placeholder (Fase 2)
# ============================================================
# Cuando activemos LiteLLM como proxy, estos modelos servirán de puente
# entre Rick (Dispatcher/Worker) y los providers (OpenAI, Codex, Gemini, etc.).
# Documentación: https://docs.litellm.ai/docs/proxy/configs
# ============================================================

model_list:
  # ============================================================
  # Modelos disponibles (actualizados 2026-03-04)
  # Proveedores activos: OpenAI Codex, Anthropic Pro, Google AI Studio
  # ============================================================

  # --- OpenAI Codex (ChatGPT Plus / GitHub Models OAuth) — PRIORIDAD 1 ---
  - model_name: openai_codex
    litellm_params:
      model: openai/gpt-5.3-codex
      api_key: os.environ/GITHUB_TOKEN          # vía GitHub Models
      api_base: https://models.inference.ai.azure.com
  - model_name: gpt_4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/GITHUB_TOKEN
      api_base: https://models.inference.ai.azure.com

  # --- Anthropic (Pro subscription: sonnet + opus + haiku) ---
  - model_name: claude_pro
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude_opus
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude_haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- Google Gemini (Google AI Studio + Vertex) ---
  - model_name: gemini_pro
    litellm_params:
      model: google/gemini-3.1-pro-preview-customtools
      api_key: os.environ/GOOGLE_API_KEY
  - model_name: gemini_pro_vertex
    litellm_params:
      model: vertex_ai/gemini-3.1-pro-preview
      vertex_project: os.environ/GOOGLE_CLOUD_PROJECT_RICK_UMBRAL
      vertex_location: us-central1
  - model_name: gemini_flash
    litellm_params:
      model: google/gemini-flash-latest
      api_key: os.environ/GOOGLE_API_KEY
  - model_name: gemini_flash_lite
    litellm_params:
      model: google/gemini-flash-lite-latest
      api_key: os.environ/GOOGLE_API_KEY

litellm_settings:
  # --- S6: Langfuse tracing (descomentar cuando Langfuse esté activo) ---
  # Requiere env: LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_OTEL_HOST
  # callbacks: ["langfuse_otel"]
  #
  # Caching con Redis (cuando esté disponible)
  # cache: true
  # cache_params:
  #   type: redis
  #   host: redis
  #   port: 6379
  drop_params: true
  set_verbose: false

general_settings:
  master_key: CHANGE_ME_LITELLM_MASTER_KEY
