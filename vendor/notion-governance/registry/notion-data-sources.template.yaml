  - "Do not add a transversal systems database here unless a real governance gap remains after reconciling the live technical hub."
  - "The 8 canonical entries above were normalized from direct confirmation on 2026-03-28. Proyectos Umbral (9th, active agent runtime DB) was discovered unregistered and added 2026-04-11. Desarrollos y Cambios de Sistema (10th) was designed 2026-04-11, pending live creation. On 2026-04-30 two more agent-runtime DBs were discovered via MCP read-only diff and added: Tareas — Umbral Agent Stack (worker execution log) and Bandeja de revisión - Rick (artifact review queue)."
  - "Use lifecycle vocabulary explicitly: `active`, `archived`, `in_trash`."
  - "The active session-derived runtime now capitalizes directly from `Transcripciones Granola`."
  - "`Registro de Sesiones y Transcripciones` remains only as a legacy V1 residue and should not be treated as an active session bridge."
  - "Teaching prompts such as `Docente 2` should remain behavior-only and should not duplicate company course knowledge."
  - "`Gobernanza Notion` is a lightweight operational mirror; do not treat it as a replica of repo-side detailed schemas."
  - "`Esquemas minimos V1` is archived because it drifted from the live governed bases; current schema detail lives in `docs/databases/`."

